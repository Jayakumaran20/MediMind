name: MediMind CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  fastapi-build:
    name: FastAPI RAG service — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi-rag-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: fastapi-rag-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check app

      - name: Compile-check
        run: python -m compileall -q app

      - name: Docker build
        run: docker build -t medimind-rag:ci .

  dotnet-build:
    name: .NET Gateway — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dotnet-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Docker build
        run: docker build -t medimind-gateway:ci .

  compose-smoke:
    name: docker compose smoke test
    runs-on: ubuntu-latest
    needs: [fastapi-build, dotnet-build]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cp .env.example .env
          echo "ANTHROPIC_API_KEY=dummy-for-build-only" >> .env

      - name: Compose build
        run: docker compose build

      - name: Compose up (Redis + gateway only, no live API)
        run: |
          docker compose up -d redis
          sleep 3
          docker compose ps
          docker compose logs redis
          docker compose down
